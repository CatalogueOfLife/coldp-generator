alias: ITIS
title: The Integrated Taxonomic Information System
description: |-
  The Integrated Taxonomic Information System (ITIS) partners with specialists from around the
  world to assemble scientific names and their taxonomic relationships, and distributes that data
  openly through publicly available software. The ITIS mission is to communicate a comprehensive
  taxonomy of global species that enables biodiversity information to be discovered, indexed, and
  connected across all human endeavors.

  ITIS is made up of 11 active MOU partners committed to improving and continually updating
  scientific and common names of all seven Kingdoms of Life: Archaea, Bacteria, Protozoa,
  Chromista, Fungi, Plantae, and Animalia. The full ITIS content is updated regularly and many
  completed taxonomic subsets are also used in the Catalogue of Life.

  For additional detail on data sources and status, see the ITIS "What's New" page:
  https://www.itis.gov/whatsnew.html

