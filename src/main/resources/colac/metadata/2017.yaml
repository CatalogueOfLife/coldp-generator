title: 'Species 2000 & ITIS Catalogue of Life: 2017 Annual Checklist.'
description: |-
  This release of the Catalogue of Life contains contributions from 156 databases with information on 1,664,506 living and 49,346 extinct species, 151,649 living and 471 extinct infraspecific taxa and also includes 1,530,963 synonyms and 418,054 common names covering the following groups:

  Viruses • Viruses and Subviral agents from ICTV_MSL

  Bacteria and Archaea from ITIS Global UPDATED!

  Chromista • Chromistan fungi from Species Fungorum • Foraminifers from WoRMS Foraminifera UPDATED!

  Protozoa • Major groups from ITIS Regional UPDATED! • Ciliates from CilCat • Polycystines from WoRMS Polycystina UPDATED! • Protozoan fungi from Species Fungorum and Trichomycetes • Microsporidians from Microsporidia • Slime moulds from Nomen.eumycetozoa.com UPDATED!

  Fungi • Various taxa in whole or in part from CABI Bioservices databases (Species Fungorum, Phyllachorales, Rhytismatales, Saccharomycetes and Zygomycetes) and from four other databases covering Xylariaceae, Glomeromycota, Trichomycetes, Dothideomycetes • Lichens from LIAS

  Plantae (Plants) • Mosses from MOST • Liverworts and hornworts from ELPT UPDATED! • Ferns and fern-allies from World Ferns UPDATED! • Cycads from The World List of Cycads • Conifers from Conifer Database • 4 flowering plant families from IOPI-GPC, 113 families from WCSP and 294 families from World Plants UPDATED! • Plus individual flowering plant families from AnnonBase, Brassicaceae, ChenoBase, Droseraceae Database, ILDIS, WWW, LecyPages, LHD, RJB Geranium, Solanaceae Source.

  Animalia (Animals) • Marine groups from URMO, ITIS Global UPDATED!, Hexacorals, ETI WBD (Euphausiacea), WoRMS Acoelomorpha UPDATED!, WoRMS Asteroidea UPDATED!, WoRMS Bochusacea UPDATED!, Brachiopoda Database UPDATED!, WoRMS Brachypoda UPDATED!, WoRMS Brachyura UPDATED!, WoRMS Bryozoa UPDATED!, WoRMS Cephalochordata UPDATED!, WoRMS Cestoda, WoRMS Chaetognatha UPDATED!, WoRMS Cumacea UPDATED!, WoRMS Echinoidea UPDATED!, WoRMS Gastrotricha UPDATED!, WoRMS Gnathostomulida UPDATED!, WoRMS Holothuroidea UPDATED!, WoRMS Hydrozoa UPDATED!, WoRMS Isopoda UPDATED!, WoRMS Kinorhyncha UPDATED!, WoRMS Leptostraca UPDATED!, WoRMS Merostomata UPDATED!, WoRMS Monogenea, WoRMS Mystacocarida UPDATED!, WoRMS Myxozoa, WoRMS Nemertea UPDATED!, WoRMS Octocorallia UPDATED!, WoRMS Oligochaeta UPDATED!, WoRMS Ophiuroidea UPDATED!, WoRMS Orthonectida UPDATED!, Phoronida Database UPDATED!, WoRMS Placozoa UPDATED!, WoRMS Polychaeta UPDATED!, WoRMS Polycystina UPDATED!, WoRMS Porifera UPDATED!, WoRMS Priapulida UPDATED!, WoRMS Proseriata-Kalyptorhynchia, WoRMS Remipedia UPDATED!, WoRMS Rhombozoa UPDATED!, , WoRMS Tanaidacea UPDATED!, WoRMS Tantulocarida UPDATED!, WoRMS Thermosbaenacea UPDATED!, WoRMS Trematoda, WoRMS Xenoturbellida UPDATED! • Rotifers, mayflies, freshwater hairworms, planarians, water fleas, aquatic mites and copepods from FADA databases: FADA Rotifera, FADA Ephemeroptera, FADA Nematomorpha, FADA Turbellaria, FADA Cladocera, FADA Halacaridae & FADA Copepoda • Entoprocts, water bears from ITIS Global UPDATED! • Spiders, scorpions, ticks & mites from WSC UPDATED!, The Scorpion Files, ITIS Global UPDATED!, TicksBase, SpmWeb BdelloideaBase & Mites GSDs: OlogamasidBase, PhytoseiidBase, RhodacaridBase & TenuipalpidBase • Diplopods, centipedes, pauropods and symphylans from SysMyr & ChiloBase • Dragonflies and damselflies from Odonata database • Stoneflies from PlecopteraSF UPDATED! • Cockroaches from CockroachSF UPDATED! • Praying mantids from MantodeaSF UPDATED! • Stick and leaf insects from PhasmidaSF UPDATED! • Ice crawlers from GrylloblattodeaSF UPDATED! • Earwigs from DermapteraSF UPDATED! • Grasshoppers, locusts, katydids and crickets from OrthopteraSF UPDATED! • Rock crawlers, gladiators from MantophasmatodeaSF UPDATED! • Webspinners from EmbiopteraSF UPDATED! • Zorapterans from ZorapteraSF UPDATED! • Bark & parasitic lices from PsocodeaSF UPDATED! • Some groups of true bugs from ScaleNet, FLOW, COOL, Psyllist, AphidSF UPDATED!, MBB, 3i Cicadellinae UPDATED!, 3i Typhlocybinae UPDATED!, 3i Cicadoidea UPDATED!, MOWD, CoreoideaSF UPDATED!, The White-Files, Tessaratomidae Database, Lace Bugs Database, PBI Plant Bug & LygaeoideaSF NEW! • Twisted-wing parasites from Strepsiptera Database • Lacewings, antlions, owlflies, fishflies, dobsonflies & snakeflies from LDL Neuropterida • Some beetle groups from the Scarabs UPDATED!, TITAN, WTaxa UPDATED!, Brentids, 3i Curculio UPDATED!, CarabCat & ITIS Global UPDATED! • Fleas from Parhost • Flies, mosquitoes, bots, midges and gnats from Systema Dipterorum, CCW & CIPA • Butterflies and moths from LepIndex, GloBIS (GART), Tineidae NHM, Global Gracillariidae, Nepticuloidea NEW! • Bees & wasps from ITIS Bees, Taxapad Ichneumonoidea, UCD, ZOBODAT Vespoidea, HymIS & ChrysididaeSF UPDATED! • Molluscs from WoRMS Mollusca • Fishes from FishBase UPDATED! • Reptiles from ReptileDB UPDATED! • Amphibians, birds and mammals from ITIS Global UPDATED!

  PLUS additional species of various taxa from ITIS Regional UPDATED!, NZIB, CoL China, FaEu Turbellaria and extinct taxa from PaleoBioDB NEW!

  Acknowledgements
