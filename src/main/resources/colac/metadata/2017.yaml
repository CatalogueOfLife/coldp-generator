  The Catalogue of Life Programme thanks all of over 150 organisations that continue to contribute taxonomic expertise. We acknowledge all of the people from the GSD community who provided us with valuable support in data export and transformation this and preceding years: Matthew Clapham, Christine Johnson, Dmitry Mozzherin, Daniel Gloor, Eli Agbayani, Yde de Jong, Simon Woodman, Timalka Kalubowila, Michael Hassler, Viktoras Didžiulis, Heimo Rainer, Alexander Kroupa, Bart Vanhoorne, Leen Vandepitte, Hernán Pereira, Marilyn Beckman, Dagmar Triebel, Adrian Hine, Angel Anta, Michael Malicky, Ward Appeltans, Guy Baillargeon, Vanderlei Perez Canhos, Rosario Dioguardi, Richard Flood, Johannes Goll, Anton Güntsch, Sergey Jezniakowsky, Antonella Linguanti, Silvia Lusa, Lisa Walley and Markus Weiss. We also acknowledge programmers who contributed in the Annual Checklist software development in the past: Jorrit van Hertum (CoL interface), Richard White (Taxon Matcher), Viktoras Didžiulis (CoL Workbench), Gideon Gijswijt, Dennis Seijts, Ayco Holleman, Núria Torrescasana Aloy.
