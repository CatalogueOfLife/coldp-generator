alias: COL15
title: 'Species 2000 & ITIS Catalogue of Life: 2015 Annual Checklist.'
description: |-
  This release of the Catalogue of Life contains contributions from 151 databases with information on 1,606,554 species, 150,118 infraspecific taxa and also includes 1,322,911 synonyms and 329,997 common names covering the following groups:

  Viruses • Viruses and Subviral agents from ICTV_MSL UPDATED!

  Bacteria and Archaea from BIOS

  Chromista • Chromistan fungi from Species Fungorum UPDATED! • Foraminifers from WoRMS Foraminifera NEW!

  Protozoa • Major groups from ITIS Regional UPDATED! • Ciliates from CilCat • Polycystines from WoRMS Polycystina UPDATED! • Protozoan fungi from Species Fungorum UPDATED! and Trichomycetes UPDATED! • Microsporidians from Microsporidia • Slime moulds from Nomen.eumycetozoa.com

  Fungi • Various taxa in whole or in part from CABI Bioservices databases (Species Fungorum UPDATED!, Phyllachorales UPDATED!, Rhytismatales UPDATED!, Saccharomycetes UPDATED! and Zygomycetes UPDATED!) and from four other databases covering Xylariaceae UPDATED!, Glomeromycota UPDATED!, Trichomycetes UPDATED!, Dothideomycetes UPDATED! • Lichens from LIAS

  Plantae (Plants) • Mosses from MOST • Liverworts and hornworts from ELPT • Ferns and fern-allies from World Ferns UPDATED! • Conifers from Conifer Database UPDATED! • Cycads and 5 flowering plant families from IOPI-GPC, 114 families from WCSP UPDATED!, 274 families from World Plants UPDATED! and 14 families from SCaDs • Plus individual flowering plant families from AnnonBase, Brassicaceae, ChenoBase, Droseraceae Database, GCC UPDATED!, ILDIS UPDATED!, LecyPages, LHD, RJB Geranium, Solanaceae Source.

  Animalia (Animals) • Marine groups from URMO, ITIS Global UPDATED!, Hexacorals, ETI WBD (Euphausiacea), WoRMS: WoRMS Acanthocephala NEW!, WoRMS Acoelomorpha NEW!, WoRMS Asteroidea UPDATED!, WoRMS Bochusacea UPDATED!, WoRMS Brachiopoda UPDATED!, WoRMS Brachypoda UPDATED!, WoRMS Brachyura UPDATED!, WoRMS Bryozoa UPDATED!, WoRMS Cephalochordata NEW!, WoRMS Cestoda, WoRMS Chaetognatha UPDATED!, WoRMS Cumacea UPDATED!, WoRMS Echinoidea UPDATED!, WoRMS Gastrotricha UPDATED!, WoRMS Gnathostomulida UPDATED!, WoRMS Holothuroidea UPDATED!, WoRMS Hydrozoa UPDATED!, WoRMS Isopoda UPDATED!, WoRMS Kinorhyncha NEW!, WoRMS Leptostraca UPDATED!, WoRMS Merostomata NEW!, WoRMS Monogenea, WoRMS Mystacocarida UPDATED!, WoRMS Myxozoa, WoRMS Nemertea UPDATED!, WoRMS Octocorallia NEW!, WoRMS Oligochaeta UPDATED!, WoRMS Ophiuroidea UPDATED!, WoRMS Orthonectida NEW!, WoRMS Phoronida UPDATED!, WoRMS Placozoa UPDATED!, WoRMS Polychaeta UPDATED!, WoRMS Polycystina UPDATED!, WoRMS Porifera UPDATED!, WoRMS Priapulida UPDATED!, WoRMS Proseriata-Kalyptorhynchia, WoRMS Remipedia UPDATED!, WoRMS Rhombozoa NEW!, WoRMS Scaphopoda UPDATED!, WoRMS Tanaidacea UPDATED!, WoRMS Tantulocarida UPDATED!, WoRMS Thermosbaenacea UPDATED!, WoRMS Trematoda, WoRMS Xenoturbellida UPDATED! • Rotifers, mayflies, freshwater hairworms, planarians, water fleas, aquatic mites and copepods from FADA databases: FADA Rotifera, FADA Ephemeroptera, FADA Nematomorpha, FADA Turbellaria, FADA Cladocera, FADA Halacaridae & FADA Copepoda NEW! • Entoprocts, water bears from ITIS Global UPDATED! • Spiders, scorpions, ticks & mites from SpidCat via ITIS UPDATED!, SalticidDB , ITIS Global UPDATED!, TicksBase, SpmWeb BdelloideaBase & Mites GSDs: OlogamasidBase, PhytoseiidBase, RhodacaridBase & TenuipalpidBase • Diplopods, centipedes, pauropods and symphylans from SysMyr & ChiloBase • Dragonflies and damselflies from Odonata database • Stoneflies from PlecopteraSF UPDATED! • Cockroaches from CockroachSF UPDATED! • Praying mantids from MantodeaSF UPDATED! • Stick and leaf insects from PhasmidaSF UPDATED! • Earwigs from DermapteraSF NEW! • Grasshoppers, locusts, katydids and crickets from OrthopteraSF UPDATED! • Webspinners from EmbiopteraSF UPDATED! • Bark & parasitic lices from PsocodeaSF UPDATED! • Some groups of true bugs from ScaleNet, FLOW UPDATED!, COOL UPDATED!, Psyllist UPDATED!, AphidSF UPDATED!, MBB, 3i Cicadellinae UPDATED!, 3i Typhlocybinae UPDATED!, 3i Cicadoidea NEW!, MOWD, CoreoideaSF UPDATED!, The White-Files UPDATED!, Tessaratomidae Database & Lace Bugs Database• Twisted-wing parasites from Strepsiptera Database UPDATED! • Lacewings, antlions, owlflies, fishflies, dobsonflies & snakeflies from LDL Neuropterida • Some beetle groups from the Scarabs UPDATED!, TITAN, WTaxa, CarabCat & ITIS Global UPDATED! • Fleas from Parhost • Flies, mosquitoes, bots, midges and gnats from Systema Dipterorum, CCW & CIPA • Butterflies and moths from LepIndex, GloBIS (GART), Tineidae NHM, Global Gracillariidae • Bees & wasps from ITIS Bees, Taxapad Ichneumonoidea, UCD, ZOBODAT Vespoidea & HymIS• Molluscs from WoRMS Mollusca, FADA Bivalvia, MolluscaFW & AFD (Pulmonata) • Fishes from FishBase UPDATED! • Reptiles from ReptileDB • Amphibians, birds and mammals from ITIS Global UPDATED!

  PLUS additional species of many groups from ITIS Regional UPDATED!, NZIB and CoL China.

  Acknowledgements
  The Catalogue of Life (CoL) thanks Naturalis in the Netherlands, the US Geological Survey, the Smithsonian Institution and the Illinois Natural History Survey in the USA, FIN in the Philippines, and Biodiversity Committee, Chinese Academy of Sciences in China. We further thank all those organisations and individuals that contributed to the CoL, and the European Commission for funding the network and infrastructure development projects: EuroCat (EVR1-CT-2002-20011, 2003-2006), 4D4Life (FP7-238988, 2009-2012) and i4Life (FP7-261555, 2010-2013).
  The Catalogue of Life Programme thanks all of the 150 organisations that continue to contribute taxonomic expertise. We acknowledge all of the people from the GSD community who provided us with valuable support in data export and transformation this and preceding years: Timalka Kalubowila, Michael Hassler, Viktoras Didžiulis, Heimo Rainer, Alexander Kroupa, Bart Vanhoorne, Leen Vandepitte, Marilyn Beckman, Dagmar Triebel, Adrian Hine, Angel Anta, Michael Malicky, Ward Appeltans, Guy Baillargeon, Vanderlei Perez Canhos, Rosario Dioguardi, Richard Flood, Johannes Goll, Anton Güntsch, Sergey Jezniakowsky, Antonella Linguanti, Silvia Lusa, Lisa Walley and Markus Weiss. The Catalogue of Life would like to express gratitude to all authors of databases who kindly contributed data in the past: CephBase by James Wood, Catriona Day & Ron O'Dor (2000-2005), AlgaeBase by Michael Guiry (2000-2012), Rosaceae checklist via IOPI-GPC by Richard Pankhurst (2006-2013), FWCrabs by Célio Magalhães (2010-2012), EbenaBase by Bruno Wallnöfer (2012-2014), Melastomataceae.Net by Susanne Renner with colleagues (2012-2014) and World Umbellifer Database by Mark Watson (2012-2014).
