---
alias: COL04
title: 'Species 2000 & ITIS Catalogue of Life, Annual Checklist 2004: Indexing the world''s known species.'
description: |-
  The Year 2004 Annual Checklist includes information on more than 308,000 species
  and 33,000 infraspecific taxa in the following groups:

  Viruses
  • Virus species from ICTVdB (the Universal Virus Database)
  Microorganisms and algae
  • Bacteria and Archaea from BIOS
  • Seaweeds and other algae incl. Cyanobacteria from AlgaeBase

  Fungi
  • 11 orders in whole or in part from CAB International’s Species Fungorum

  Animals
  • Fishes from FishBase
  • Ants, birds, isopods, hydrozoan stony corals, turtles, crocodiles, and small groups
  of mammals, amphibians, molluscs, and crustaceans from ITIS
  • Scarabaeid beetles from the World Scarabaeidae Database
  • Crickets, grasshoppers, locusts, and katydids from the Orthoptera Species File
  • Cephalopods from CephBase
  • Marine invertebrates (12 phyla, 5 classes and 4 orders) and chordates (4 classes)
  from the UNESCO/IOC Register of Marine Organisms
  • Sea anemones (Order Actiniaria) from Hexacorallians of the World
  • Snails and slugs (some groups) from ABRS
  • Shrimps from ETI’s Euphausiids of the World Ocean database
  • American Phlebotomine sandflies from CIPA and ITIS

  Plants
  • Legumes from the ILDIS World Database of Legumes
  • Cycads and 4 angiosperm families from the IOPI Global Plant Checklist
  • Seagrasses from AlgaeBase
  • Mosses from Moss TROPICOS

  PLUS additional species from the Integrated Taxonomic Information System (ITIS),
  CABI’s Species Fungorum and the Australian Biological Resources Study (ABRS).
