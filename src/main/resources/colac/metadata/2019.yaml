alias: COL19
title: 'Species 2000 & ITIS Catalogue of Life: 2019 Annual Checklist.'
description: |-
  This release of the Catalogue of Life contains contributions from 172 taxonomic databases with information on 1,837,565 living and 63,418 extinct species, 160,909 living and 590 extinct infraspecific taxa which belong to 184,526 genera, 12,267 families, 1,643 orders, 387 classes, 104 phyla and 7 kingdoms plus viruses, it also includes 1,710,092 synonyms and 437,994 common names, and covering the following groups:

  Viruses • Viruses and Subviral agents from ICTV_MSL

  Bacteria and Archaea from ITIS Global

  Chromista • Chromistan fungi from Species Fungorum • Foraminifers from WoRMS Foraminifera UPDATED!

  Protozoa • Major groups from ITIS Regional • Ciliates from CilCat • Polycystines from WoRMS Polycystina UPDATED! • Protozoan fungi from Species Fungorum and Trichomycetes • Microsporidians from Microsporidia • Slime moulds from Nomen.eumycetozoa.com UPDATED!

  Fungi • Various groups in whole or in part from Species Fungorum, Phyllachorales, Rhytismatales, Saccharomycetes, Zygomycetes and from four other databases covering Xylariaceae, Glomeromycota, Trichomycetes, Dothideomycetes • Lichens from LIAS

  Plantae (Plants) • Mosses from MOST • Liverworts and hornworts from ELPT UPDATED! • Ferns and fern-allies from World Ferns UPDATED! • Cycads from The World List of Cycads UPDATED! • Conifers from Conifer Database • 113 flowering plant families from WCSP and 294 families from World Plants UPDATED! • Plus individual flowering plant families from AnnonBase, Brassicaceae, Droseraceae Database, ILDIS UPDATED!, WWW, RJB Geranium.

  Animalia (Animals) • Marine groups from ITIS Global, ETI WBD (Euphausiacea), Brachiopoda Database, Phoronida Database, WoRMS Antipatharia UPDATED!, WoRMS Appendicularia UPDATED!, WoRMS Ascidiacea UPDATED!, WoRMS Asteroidea UPDATED!, WoRMS Bochusacea UPDATED!, WoRMS Brachypoda UPDATED!, WoRMS Brachyura UPDATED!, WoRMS Bryozoa UPDATED!, WoRMS Cephalochordata UPDATED!, WoRMS Ceriantharia UPDATED!, WoRMS Cestoda UPDATED!, WoRMS Chaetognatha UPDATED!, WoRMS Copepoda UPDATED!, WoRMS Corallimorpharia UPDATED!, WoRMS Ctenophora UPDATED!, WoRMS Cubozoa UPDATED!, WoRMS Cumacea UPDATED!, WoRMS Echinoidea UPDATED!, WoRMS Foraminifera UPDATED!, WoRMS Gastrotricha UPDATED!, WoRMS Gnathostomulida UPDATED!, WoRMS Hexacoral UPDATED!, WoRMS Holothuroidea UPDATED!, WoRMS Hydrozoa UPDATED!, WoRMS Isopoda UPDATED!, WoRMS Kinorhyncha UPDATED!, WoRMS Leptostraca UPDATED!, WoRMS Loricifera UPDATED!, WoRMS Merostomata UPDATED!, WoRMS MilliBase UPDATED!, WoRMS Mollusca UPDATED!, WoRMS Monogenea UPDATED!, WoRMS Mystacocarida UPDATED!, WoRMS Myxozoa UPDATED!, WoRMS Nemertea UPDATED!, WoRMS Octocorallia UPDATED!, WoRMS Oligochaeta UPDATED!, WoRMS Ophiuroidea UPDATED!, WoRMS Orthonectida UPDATED!, WoRMS Ostracoda UPDATED!, WoRMS Placozoa UPDATED!, WoRMS Polychaeta UPDATED!, WoRMS Polycystina UPDATED!, WoRMS Porifera UPDATED!, WoRMS Priapulida UPDATED!, WoRMS PycnoBase UPDATED!, WoRMS Remipedia UPDATED!, WoRMS Rhombozoa UPDATED!, WoRMS Scleractinia UPDATED!, WoRMS Scyphozoa UPDATED!, WoRMS Staurozoa UPDATED!, WoRMS Tanaidacea UPDATED!, WoRMS Tantulocarida UPDATED!, WoRMS Thaliacea UPDATED!, WoRMS Thermosbaenacea UPDATED!, WoRMS Trematoda UPDATED!, WoRMS Turbellarians UPDATED!, WoRMS Xenoturbellida UPDATED!, WoRMS Zoantharia UPDATED!, WoRMS Amphipoda NEW! • Rotifers, mayflies, freshwater hairworms, planarians, water fleas and aquatic mites from FADA databases: FADA Rotifera, FADA Ephemeroptera, FADA Nematomorpha, FADA Cladocera & FADA Halacaridae • Entoprocts, water bears from ITIS Global • Spiders, scorpions, ticks & mites from WSC UPDATED!, The Scorpion Files, ITIS Global, TicksBase, SpmWeb BdelloideaBase & Mites GSDs: OlogamasidBase, PhytoseiidBase, RhodacaridBase & TenuipalpidBase • Centipedes from ChiloBase • Dragonflies and damselflies from Odonata database • Stoneflies from SF Plecoptera UPDATED! • Cockroaches from SF Cockroach UPDATED! • Termites from SF Isoptera • Praying mantids from SF Mantodea UPDATED! • Stick and leaf insects from SF Phasmida UPDATED! • Ice crawlers from SF Grylloblattodea UPDATED! • Earwigs from SF Dermaptera UPDATED! • Grasshoppers, locusts, katydids and crickets from SF Orthoptera UPDATED! • Rock crawlers, gladiators from SF Mantophasmatodea UPDATED! • Webspinners from SF Embioptera UPDATED! • Zorapterans from SF Zoraptera UPDATED! • Bark & parasitic lices from SF Psocodea UPDATED! • Thrips from ThripsWiki NEW! • Some groups of true bugs from ScaleNet, FLOW UPDATED!, COOL UPDATED!, Psyllist UPDATED!, SF Aphid UPDATED!, MBB, ColeorrhynchaSF UPDATED!, 3i Auchenorrhyncha, MOWD, SF Coreoidea UPDATED!, The White-Files UPDATED!, Tessaratomidae Database UPDATED!, Lace Bugs Database UPDATED!, PBI Plant Bug & SF Lygaeoidea UPDATED! • Twisted-wing parasites from Strepsiptera Database UPDATED! • Lacewings, antlions, owlflies, fishflies, dobsonflies & snakeflies from LDL Neuropterida UPDATED! • Some beetle groups from the Scarabs UPDATED!, TITAN, WTaxa, Brentids UPDATED!, 3i Curculio UPDATED!, CarabCat, Jewel Beetles, StaphBase NEW! & ITIS Global • Fleas from Parhost • Flies, mosquitoes, bots, midges and gnats from Systema Dipterorum, CCW & CIPA • Butterflies and moths from LepIndex, GloBIS (GART), Tineidae NHM, Global Gracillariidae, Nepticuloidea, Pterophoroidea • Bees & wasps from ITIS Bees, Taxapad Ichneumonoidea, UCD, ZOBODAT Vespoidea, HymIS & SF Chrysididae UPDATED! • Fishes from FishBase • Reptiles from ReptileDB • Amphibians, birds and mammals from ITIS Global

  PLUS additional species of various taxa from ITIS Regional, NZIB, CoL China, extinct taxa from PaleoBioDB UPDATED! & Fossil Ginkgoales NEW!, and missing parts of the classification down to genus level from IRMNG.

  Acknowledgements
