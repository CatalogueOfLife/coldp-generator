alias: COL00
title: 'Species 2000 Catalogue of Life: Indexing the world''s known species. Year 2000 Prototype Annual Checklist.'
description: |-
  Species 2000 aims to list all known species of plants, animals, fungi and microbes as baseline data for studies of global biodiversity. lt will also give а simple link to other data systems for all groups of organisms.

  This prototype Annual Checklist covers various groups of organisms, including bacteria, fish, birds, some other animals, algae, and some plant families. lt is being expanded to cover аlI organisms. The Annual Checklist will bе а stable taxonomic reference, availabe through the Web and оn CD-ROM. Users may prefer this stable list to the on-line Dynamic Checklist, which could change frequently, depending оn changes to а group's taxonomy or additions to the database.

  The Year 2000 Prototype Annual Checklist includes datasets for the following:

  Microorganisms and protists
  •	Bacteria and Archaea from BIOS
  •	Brown, green and red seaweeds from the Seaweed 2000 Database

  Fungi
  •	11 orders in whole or in part from САВ International’s Species Fungorum

  Animals
  •	Fish (6 classes) from FishBase
  •	Birds, isopods, hydrozoan stony corals, turtles, crocodiles, and small groups of mammals, amphibians, molluscs, and crustaceans from ITIS
  •	Scarabaeid beetles from the World Scarabaeidae Database
  •	Cephalopods from CephBase
  •	Marine organisms (9 phyla, 3 classes and 2 orders) from the UNESCO/IOC Register of Marine Organisms

  Plants
  •	Legumes from the ILDIS World Database of Legumes
  •	Vascular plants (3 families) from the IOPI Global Plant Checklist
  •	Seagrasses from the Seaweed 2000 Database

  PLUS additional species from the Integrated Taxonomic Information System (ITIS).
