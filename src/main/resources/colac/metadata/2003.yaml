alias: COL03
title: 'Species 2000 & ITIS Catalogue of Life: Indexing the world''s known species. Year 2003 Annual Checklist.'
description: |-
  The Year 2003 Annual Checklist includes datasets for the following groups:

  Viruses
  •	Virus species from ICТVdB (the Universal Virus Database)

  Microorganisms and protists
  •	Bacteria and Archaea from BIOS
  •	Seaweeds and other algae incl. Cyanobacteria from AlgaeBase

  Fungi
  •	11 orders in whole оr in part from САВ International's Species Fungorum

  Animals
  •	Fishes from FishBase
  •	Ants, birds, isopods, hydrozoan stony corals, turtles, crocodiles, and small groups of mammals, amphibians, molluscs, and crustaceans from IТIS
  •	Scarabaeid beetles from the World Scarabaeidae Database
  •	Cephalopods from CephBase
  •	Marine invertebrates (11 phyla, 5 classes and 4 orders) from the UNESCO/IOC Register of Marine Organisms
  •	Sea anemones (Order Actiniaria) from Hexacorallians of the World
  •	Snails and slugs (some groups) from ABRS
  •	Shrimps from EТI’s Euphausiids of the World Ocean database

  Plants
  •	Legumes from the ILDIS World Database of Legumes
  •	Cycads and З angiosperm families from the IOPI Global Plant Checklist
  •	Seagrasses from AlgaeBase
  •	Mosses from Moss TROPICOS

  PLUS additional species from the Integrated Taxonomic Information System (ITIS), CABI's Species Fungorum and the Australian Biological Resources Study (ABRS).
