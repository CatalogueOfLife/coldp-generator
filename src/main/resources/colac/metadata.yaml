alias: {alias}
title: Catalogue of Life Checklist
description: |-
  The Catalogue of Life {year} Annual Checklist is a historical edition of the Catalogue of Life,
  an integrated, quality-checked global index of the world's known species assembled from many
  Global Species Databases (GSDs). Each Annual Checklist was a fixed, citable yearly snapshot.

  This ColDP archive was generated from the original Species 2000 / Catalogue of Life Annual
  Checklist MySQL database for {year}. It contains the accepted classification, synonyms,
  vernacular names, distributions and references, with each name attributed to its contributing
  source database via sourceID. The contributing databases are listed below as sources.

  The original MySQL dumps for all Annual Checklists are available from
  https://www.catalogueoflife.org/data/download
