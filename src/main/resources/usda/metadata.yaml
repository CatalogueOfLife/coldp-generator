---
alias: USDA PLANTS
title: USDA PLANTS Database
description: |-
  The USDA PLANTS Database provides standardized information about the vascular plants,
  mosses, liverworts, hornworts, and lichens of the United States and its territories. It
  includes names, plant symbols, checklists, distributional data, species abstracts,
  characteristics, images, crop information, and references.

  The database covers approximately 49,000 accepted taxa and 44,000 synonyms, including
  plants native and introduced to the US and its territories.

  When run with the --enrich flag, the generator also fetches per-taxon profile data from
  the USDA PLANTS API (https://plantsservices.sc.egov.usda.gov/api/) for each accepted name,
  adding distribution records (native/introduced status by US region), growth habit and
  duration as taxon properties, and representative images. Additional data available from the
  API but not currently fetched includes: PlantCharacteristics, PlantNoxiousStatus,
  PlantInvasiveStatus, PlantWetland, PlantLegalStatus, and PlantSynonyms endpoints.
  Each call to PlantProfile?symbol=SYMBOL takes ~1 s; with 10 parallel threads the first
  enrichment run takes ~1.5 hours; subsequent runs reuse cached profile-SYMBOL.json files.

