alias: Clements
title: The eBird/Clements Checklist of Birds of the World
description: |-
  The eBird/Clements Checklist of Birds of the World is a comprehensive taxonomic reference
  documenting more than 10,000 species of birds recognised by the scientific and birding
  communities. It provides taxonomic sequences with scientific and English names, authorities,
  and worldwide range descriptions for each species and subspecies.

  Originally published by James F. Clements in his 2007 sixth edition, the checklist has been
  maintained and updated annually by the Cornell Lab of Ornithology since his death in 2005.
  It serves as the authoritative world checklist of the American Birding Association and is
  integrated with the eBird citizen-science platform, making it one of the most widely used
  bird taxonomic authorities in the world.

  Annual updates incorporate changes in taxonomy, scientific and English nomenclature, and range
  descriptions accepted by the relevant scientific community.

