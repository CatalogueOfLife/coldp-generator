description: |-
  Taxonomic database of all bat species (Chiroptera), compiled and edited by
  Nancy B. Simmons and Andrea L. Cirranello at the American Museum of Natural History.
  The database covers approximately 1,400 species in over 200 genera, providing
  accepted names, synonyms, authorship, distributions, type localities, vernacular names,
  and bibliographic references for all recognised chiropteran taxa.
