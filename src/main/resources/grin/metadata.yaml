---
alias: GRIN
title: Germplasm Resources Information Network (GRIN) Taxonomy
description: |-
  The GRIN-Global Taxonomy database provides classification and nomenclature for cultivated plants
  and many other economic plants on a worldwide basis. The database is maintained by taxonomists
  at the National Germplasm Resources Laboratory of the USDA Agricultural Research Service.

  Coverage includes 28,745 genera (14,953 accepted), 133,904 species or infraspecies (73,279 accepted),
  and 623,723 germplasm accessions. Data fields include scientific names, common names in many languages,
  geographical distributions, literature references, economic importance, regulated noxious weeds,
  and threatened/endangered plant listings.

  Homotypic and heterotypic synonymy is distinguished. Economic use data is based on Cook's (1995)
  Economic Botany Data Collection Standard, covering 16 primary use classes subdivided into 113 subclasses.

