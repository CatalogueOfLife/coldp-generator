---
alias: IOC
title: IOC World Bird List
description: |-
  The IOC World Bird List is a free, openly available resource maintained by the International
  Ornithological Committee (IOC). It represents the most current, comprehensive listing of all
  extant bird species of the world, compiled with the aim of promoting the stability of scientific
  and English names of birds worldwide. The list provides scientific names, English names,
  authorities, and geographic ranges for all species, as well as subspecies for each species.

  It is widely used as a standard reference for bird taxonomy by ornithologists, birders,
  conservation organisations, and government agencies around the world. The IOC list is updated
  twice annually, incorporating new species discoveries, taxonomic revisions based on recent
  phylogenetic work, and changes in nomenclature.

  The multilingual edition additionally provides vernacular names in more than 40 languages.

